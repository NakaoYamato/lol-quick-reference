<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- ↓iPhoneなどのスマホ画面サイズに合わせるための必須タグです -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL 早見表ツール (テスト)</title>
     
    <style>
        /* 見た目を整える簡単なCSS */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .card {
            background-color: #ffffff;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 40px auto;
        }
        h1 {
            color: #005a82;
            font-size: 24px;
        }
        p {
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hello World!</h1>
        <p>GitHub Pagesの公開テスト成功です！🎉</p>
        <p>このページがiPhoneからも確認できたら、<br>いよいよLoL早見表ツールの開発を始めましょう。</p>
    </div>

</body>
</html>
