<div class="card">
        <h1>LoL 早見表ツール</h1>
        <div id="data-container">
            <p>ここにチャンピオンのデータが表示されます...</p>
        </div>
    </div>

    <script>
        // 非同期処理でJSONデータ（マスターデータ）を読み込む
        async function loadChampions() {
            try {
                const response = await fetch('champions.json');
                const champions = await response.json();
                
                // 読み込んだデータをコンテナに流し込んで描画（レンダリング）する
                const container = document.getElementById('data-container');
                container.innerHTML = ''; // 一旦中身を空にする

                // 配列のデータを取り出してHTMLを生成
                champions.forEach(champ => {
                    const champHtml = `
                        <div style="border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 10px; text-align: left;">
                            <h3>${champ.name}</h3>
                            <p><strong>Ult効果:</strong> ${champ.ult_effect}</p>
                            <p><strong>メモ:</strong> ${champ.my_notes}</p>
                        </div>
                    `;
                    container.innerHTML += champHtml;
                });

            } catch (error) {
                console.error("データの読み込みに失敗しました", error);
            }
        }

        // 画面が表示された時に読み込み関数を実行
        loadChampions();
    </script>
