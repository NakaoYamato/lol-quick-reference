<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- スマホアプリのように画面にフィットさせ、ズームを無効化する設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LoL 早見表</title>
    
    <style>
        /* 全体の初期設定 */
        * { box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #010a13; /* LoL風の背景色を全体に適用 */
            color: #f0e6d2;
            margin: 0;
            padding: 0;
            -webkit-text-size-adjust: 100%;
        }
        
        /* アプリ風のコンテナ */
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ヘッダー＆検索エリア (上部に配置) */
        .top-section {
            padding: 15px 15px 10px 15px;
            background-color: #010a13;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        h1 { color: #c8aa6e; font-size: 18px; margin: 0; }
        
        .search-row {
            display: flex;
            gap: 8px;
        }
        #search-input {
            flex-grow: 1;
            padding: 10px;
            font-size: 16px; /* 16px以上にしないとiPhoneで自動ズームされてしまうため必須 */
            border-radius: 6px;
            border: 1px solid #3c3c41;
            background: #1e282d;
            color: #fff;
            outline: none;
        }
        #search-input:focus { border-color: #c8aa6e; }

        /* 汎用ボタン */
        .btn {
            padding: 10px 14px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid;
            white-space: nowrap;
        }
        .btn-primary { background-color: #1e282d; color: #c8aa6e; border-color: #c8aa6e; }
        .btn-danger { background-color: transparent; color: #ff4c4c; border-color: #ff4c4c; }

        /* ★ iPhone用UIの要：追従するキャラアイコンバー ★ */
        .sticky-team-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: #010a13;
            border-bottom: 2px solid #3c3c41;
            padding: 10px 15px;
            display: flex;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }
        /* アイコンの枠（最大5個） */
        .champ-slot {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #111a21;
            border: 2px dashed #3c3c41;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .champ-slot img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #1e282d;
        }
        /* 選択中のキャラの強調 */
        .champ-slot.active {
            border-color: #c8aa6e;
            transform: scale(1.1);
        }
        .champ-slot.active img {
            border-color: #c8aa6e;
            box-shadow: 0 0 10px rgba(200, 170, 110, 0.6);
        }

        /* 詳細エリア */
        .detail-area {
            flex-grow: 1;
            padding: 15px;
            background-color: #111a21;
        }
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid #3c3c41;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }
        .detail-title { margin: 0; color: #c8aa6e; font-size: 22px; }
        .role-text { color: #a09b8c; font-size: 12px; margin-left: 8px; }
        
        .item-badge {
            display: inline-block;
            background-color: #2b1a1a;
            color: #ff6b6b;
            border: 1px solid #7c2a2a;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 6px;
            margin-bottom: 6px;
        }

        .info-section { margin-bottom: 15px; }
        .info-label { color: #a09b8c; font-size: 12px; margin-bottom: 4px; display: block; font-weight: bold; }
        .info-text { color: #f0e6d2; font-size: 14px; line-height: 1.5; margin: 0; }
        .info-text.ult { color: #c8aa6e; font-weight: bold; }

        .memo-textarea {
            width: 100%;
            height: 100px;
            background: #1e282d;
            color: #00d4ff;
            border: 1px solid #3c3c41;
            border-radius: 6px;
            padding: 10px;
            font-size: 15px;
            font-family: inherit;
            resize: none; /* スマホではリサイズ不可にする */
        }
        .memo-textarea:focus { outline: none; border-color: #00d4ff; }
        
        .empty-state { text-align: center; color: #666; margin-top: 40px; font-size: 14px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- 上部検索・コントロールエリア -->
    <div class="top-section">
        <div class="header-row">
            <h1>LoL Quick Reference</h1>
            <button onclick="resetTeam()" class="btn btn-danger" style="padding: 6px 10px; font-size: 12px;">全クリア</button>
        </div>
        <div class="search-row">
            <input type="text" id="search-input" list="champ-list" placeholder="キャラ名を入力...">
            <datalist id="champ-list"></datalist>
            <button onclick="addChampion()" class="btn btn-primary">追加</button>
        </div>
    </div>

    <!-- 追従するキャラアイコンバー (最大5枠) -->
    <div class="sticky-team-bar" id="selected-team">
        <!-- 初期状態の空スロット -->
        <div class="champ-slot"></div>
        <div class="champ-slot"></div>
        <div class="champ-slot"></div>
        <div class="champ-slot"></div>
        <div class="champ-slot"></div>
    </div>

    <!-- 詳細表示エリア -->
    <div class="detail-area" id="detail-area">
        <div class="empty-state">
            👆 上の検索欄から敵チームのキャラを追加してください
        </div>
    </div>

</div>

<!-- Firebase対応スクリプト -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ▼▼▼ Firebaseの設定情報（ご自身のものに置き換えてください） ▼▼▼
    const firebaseConfig = {
        apiKey: "AIzaSyA2TcDboCe_vdW622zEtG15-zkYj3ePjN4",
        authDomain: "lol-memo-app.firebaseapp.com",
        projectId: "lol-memo-app",
        storageBucket: "lol-memo-app.firebasestorage.app",
        messagingSenderId: "389241235779",
        appId: "1:389241235779:web:62e345a781bd0c3831a7f6"
    };
    // ▲▲▲ ここまで ▲▲▲

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allChampions = [];
    let enemyTeam = [];
    let activeChamp = null; 
    const D_DRAGON_URL = "https://ddragon.leagueoflegends.com/cdn/14.13.1/img/champion/";
    const roleFiles = ['tanks.json', 'fighters.json', 'mages.json', 'assassins.json', 'marksmen.json', 'supports.json'];

    async function init() {
        try {
            for (const file of roleFiles) {
                try {
                    const response = await fetch(file);
                    if (response.ok) {
                        const data = await response.json();
                        allChampions = allChampions.concat(data);
                    }
                } catch (e) {
                    console.error(`${file} 読み込みエラー:`, e);
                }
            }
            const dataList = document.getElementById('champ-list');
            allChampions.forEach(champ => {
                const option = document.createElement('option');
                option.value = champ.name;
                dataList.appendChild(option);
            });
            renderTeam(); // 初期スロットの描画
        } catch (error) {
            console.error("初期化失敗", error);
        }
    }

    window.addChampion = function() {
        const inputElement = document.getElementById('search-input');
        const champName = inputElement.value;
        const champ = allChampions.find(c => c.name === champName);

        if (!champ) return;
        if (enemyTeam.length >= 5) { alert("すでに5体選択されています。"); return; }
        if (enemyTeam.some(c => c.id === champ.id)) return;

        enemyTeam.push(champ);
        inputElement.value = '';
        inputElement.blur(); // スマホのキーボードを閉じる
        
        showDetail(champ);
        renderTeam();
    }

    window.removeChampion = function(champId) {
        enemyTeam = enemyTeam.filter(c => c.id !== champId);
        if (activeChamp && activeChamp.id === champId) {
            activeChamp = null;
            document.getElementById('detail-area').innerHTML = '<div class="empty-state">👆 キャラのアイコンをタップして詳細を表示</div>';
        }
        renderTeam();
    }

    window.resetTeam = function() {
        enemyTeam = [];
        activeChamp = null;
        document.getElementById('detail-area').innerHTML = '<div class="empty-state">👆 上の検索欄から敵チームのキャラを追加してください</div>';
        renderTeam();
    }

    // アイコンバーの描画（常に5枠表示するiPhone向けUI）
    function renderTeam() {
        const teamContainer = document.getElementById('selected-team');
        teamContainer.innerHTML = ''; 

        for (let i = 0; i < 5; i++) {
            const slot = document.createElement('div');
            const champ = enemyTeam[i];

            if (champ) {
                const isActive = activeChamp === champ;
                slot.className = `champ-slot ${isActive ? 'active' : ''}`;
                slot.onclick = () => { showDetail(champ); renderTeam(); };
                
                const imgName = champ.id.charAt(0).toUpperCase() + champ.id.slice(1) + ".png";
                slot.innerHTML = `<img src="${D_DRAGON_URL}${imgName}" alt="${champ.name}">`;
            } else {
                slot.className = 'champ-slot'; // 空スロット
            }
            teamContainer.appendChild(slot);
        }
    }

    function showDetail(champ) {
        activeChamp = champ;
        const detailArea = document.getElementById('detail-area');
        const roleText = champ.role ? champ.role : '未設定';
        
        const counterItemsHtml = (champ.counter_items && champ.counter_items.length > 0)
            ? champ.counter_items.map(item => `<span class="item-badge">${item}</span>`).join('')
            : '<span style="color: #666; font-size: 12px;">未設定</span>';

        let localMemo = localStorage.getItem(`lol_memo_${champ.id}`) || champ.my_notes || "";

        detailArea.innerHTML = `
            <div class="detail-header">
                <div>
                    <h2 class="detail-title">${champ.name}<span class="role-text">${roleText}</span></h2>
                </div>
                <!-- 誤タップ防止のため、削除ボタンを広々とした詳細画面に配置 -->
                <button onclick="removeChampion('${champ.id}')" class="btn btn-danger" style="padding: 4px 8px; font-size: 12px;">外す</button>
            </div>

            <div class="info-section">
                <span class="info-label">対策アイテム</span>
                <div>${counterItemsHtml}</div>
            </div>

            <div class="info-section">
                <span class="info-label">Ult効果</span>
                <p class="info-text ult">${champ.ult_effect}</p>
            </div>

            <div class="info-section">
                <span class="info-label">コンボ</span>
                <p class="info-text">${champ.combos.join('<br>')}</p>
            </div>

            <div class="info-section">
                <span class="info-label">メモ (自動同期中...)</span>
                <textarea id="memo-${champ.id}" class="memo-textarea" oninput="saveMemo('${champ.id}')">${localMemo}</textarea>
            </div>
        `;

        fetchMemoFromFirebase(champ.id);
    }

    async function fetchMemoFromFirebase(champId) {
        try {
            const docRef = doc(db, "memos", champId);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const firebaseText = docSnap.data().text;
                const textarea = document.getElementById(`memo-${champId}`);
                if (textarea && textarea.value !== firebaseText) {
                    textarea.value = firebaseText;
                    localStorage.setItem(`lol_memo_${champId}`, firebaseText);
                }
            }
        } catch (error) {
            console.error("Firebase取得エラー:", error);
        }
    }

    let typingTimer;
    window.saveMemo = function(champId) {
        const textarea = document.getElementById(`memo-${champId}`);
        if (!textarea) return;
        
        localStorage.setItem(`lol_memo_${champId}`, textarea.value);
        clearTimeout(typingTimer);
        
        typingTimer = setTimeout(async () => {
            try {
                await setDoc(doc(db, "memos", champId), {
                    text: textarea.value,
                    updatedAt: new Date()
                });
            } catch (error) {
                console.error("Firebase保存エラー:", error);
            }
        }, 1000);
    }

    init();
</script>
</body>
</html>
